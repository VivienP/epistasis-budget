<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="900" viewBox="0 0 2048 900" role="img" aria-labelledby="title desc">
  <title id="title">epibudget structural allocation workflow</title>
  <desc id="desc">A four-stage workflow from a protein target, mutable sites, and budget B through candidate enumeration and structural interaction-loop coverage to a ranked shortlist. Conjoint ESM-2 fitness and masking-dispersion signals appear as optional benchmark controls, not the supported main path.</desc>
  <defs>
    <style>
      .heading { font: 700 30px Arial, Helvetica, sans-serif; letter-spacing: .4px; fill: #0f1b2d; }
      .subheading { font: 400 28px Arial, Helvetica, sans-serif; fill: #27384a; }
      .label { font: 400 27px Arial, Helvetica, sans-serif; fill: #0f1b2d; }
      .small { font: 400 22px Arial, Helvetica, sans-serif; fill: #526170; }
      .tiny { font: 700 18px Arial, Helvetica, sans-serif; letter-spacing: .5px; fill: #0f1b2d; }
      .white { fill: #ffffff; }
      .line { stroke: #31495d; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #31495d; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .muted-line { stroke: #aab4bc; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .optional-line { stroke: #85929d; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 10 10; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12" fill="none" stroke="#31495d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowOptional" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12" fill="none" stroke="#85929d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="2048" height="900" fill="#fbfaf7"/>

  <!-- Stage headings -->
  <text class="heading" x="244" y="68" text-anchor="middle">STAGE 1 — INPUT</text>
  <text class="heading" x="708" y="68" text-anchor="middle">STAGE 2 — CANDIDATES</text>
  <text class="heading" x="1218" y="68" text-anchor="middle">STAGE 3 — STRUCTURAL ALLOCATION</text>
  <text class="heading" x="1755" y="68" text-anchor="middle">STAGE 4 — OUTPUT</text>

  <text class="subheading" x="244" y="119" text-anchor="middle">Target · mutable sites · budget B</text>
  <text class="subheading" x="708" y="119" text-anchor="middle">Enumerate complete variants</text>
  <text class="subheading" x="1218" y="119" text-anchor="middle">Brace interaction loops</text>
  <text class="subheading" x="1755" y="119" text-anchor="middle">Ranked shortlist of B variants</text>

  <!-- Main-flow arrows -->
  <path class="line" d="M444 340 H500" marker-end="url(#arrow)"/>
  <path class="line" d="M901 340 H958" marker-end="url(#arrow)"/>
  <path class="line" d="M1468 340 H1524" marker-end="url(#arrow)"/>

  <!-- Stage 1: protein target and budget -->
  <path d="M69 334 H187 L202 321 L217 347 L232 321 L247 347 L262 334 H419" stroke="#34485a" stroke-width="32" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="111" y="308" width="22" height="52" rx="7" fill="#e3a23b"/>
  <rect x="175" y="308" width="22" height="52" rx="7" fill="#e3a23b"/>
  <rect x="239" y="308" width="22" height="52" rx="7" fill="#e3a23b"/>
  <rect x="348" y="308" width="22" height="52" rx="7" fill="#e3a23b"/>
  <path d="M122 363 V391 H250 V363" stroke="#e3a23b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="label" x="186" y="430" text-anchor="middle">Mutable sites</text>
  <text class="small" x="244" y="270" text-anchor="middle">Protein target</text>
  <rect x="171" y="472" width="146" height="58" rx="29" fill="#d5e8e5" stroke="#4d8c8b" stroke-width="3"/>
  <text class="heading" x="244" y="510" text-anchor="middle">B wells</text>

  <!-- Stage 2: candidate variants -->
  <g>
    <rect x="548" y="215" width="300" height="40" rx="13" fill="#34485a"/>
    <rect x="629" y="211" width="24" height="48" rx="8" fill="#e3a23b"/>
    <text class="tiny" x="641" y="242" text-anchor="middle">M</text>
    <rect x="854" y="215" width="45" height="40" rx="20" fill="#eef1f2"/>
    <text class="tiny" x="876" y="242" text-anchor="middle">1</text>

    <rect x="548" y="290" width="300" height="40" rx="13" fill="#34485a"/>
    <rect x="629" y="286" width="24" height="48" rx="8" fill="#e3a23b"/>
    <rect x="705" y="286" width="24" height="48" rx="8" fill="#e3a23b"/>
    <text class="tiny" x="641" y="317" text-anchor="middle">M</text>
    <text class="tiny" x="717" y="317" text-anchor="middle">A</text>
    <rect x="854" y="290" width="45" height="40" rx="20" fill="#eef1f2"/>
    <text class="tiny" x="876" y="317" text-anchor="middle">2</text>

    <rect x="548" y="365" width="300" height="40" rx="13" fill="#34485a"/>
    <rect x="592" y="361" width="24" height="48" rx="8" fill="#e3a23b"/>
    <rect x="667" y="361" width="24" height="48" rx="8" fill="#e3a23b"/>
    <rect x="743" y="361" width="24" height="48" rx="8" fill="#e3a23b"/>
    <text class="tiny" x="604" y="392" text-anchor="middle">M</text>
    <text class="tiny" x="679" y="392" text-anchor="middle">T</text>
    <text class="tiny" x="755" y="392" text-anchor="middle">N</text>
    <rect x="854" y="365" width="45" height="40" rx="20" fill="#eef1f2"/>
    <text class="tiny" x="876" y="392" text-anchor="middle">3</text>

    <circle cx="698" cy="442" r="4" fill="#526170"/>
    <circle cx="698" cy="459" r="4" fill="#526170"/>
    <circle cx="698" cy="476" r="4" fill="#526170"/>
    <text class="label" x="723" y="522" text-anchor="middle">Singles · doubles · triples</text>
  </g>

  <!-- Stage 3: structural factor graph -->
  <g>
    <path class="thin" d="M1035 348 L1104 246 L1217 205 L1320 260 L1403 352 L1336 458 L1210 498 L1095 448 Z"/>
    <path class="thin" d="M1035 348 L1217 205 L1210 498 M1104 246 L1320 260 L1336 458 L1095 448 Z"/>
    <path class="thin" d="M1104 246 L1210 498 M1320 260 L1095 448 M1035 348 L1403 352"/>
    <path d="M1104 246 L1217 205 L1320 260 L1218 351 Z" fill="#4d8c8b" opacity="0.18" stroke="#4d8c8b" stroke-width="4"/>
    <path d="M1095 448 L1218 351 L1336 458 Z" fill="#4d8c8b" opacity="0.28" stroke="#4d8c8b" stroke-width="5"/>
    <path d="M1217 205 L1218 351 L1336 458" stroke="#e3a23b" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M1218 351 C1265 314 1320 307 1361 340 C1390 364 1398 407 1374 437 C1348 468 1298 458 1285 420 C1275 391 1293 358 1320 350" stroke="#4d8c8b" stroke-width="18" opacity="0.28" fill="none" stroke-linecap="round"/>
    <path d="M1218 351 C1265 314 1320 307 1361 340 C1390 364 1398 407 1374 437 C1348 468 1298 458 1285 420 C1275 391 1293 358 1320 350" stroke="#4d8c8b" stroke-width="7" fill="none" stroke-linecap="round"/>

    <g fill="#fbfaf7" stroke="#26394b" stroke-width="5">
      <circle cx="1035" cy="348" r="15"/>
      <circle cx="1104" cy="246" r="15"/>
      <circle cx="1217" cy="205" r="15"/>
      <circle cx="1320" cy="260" r="15"/>
      <circle cx="1403" cy="352" r="15"/>
      <circle cx="1336" cy="458" r="15"/>
      <circle cx="1210" cy="498" r="15"/>
      <circle cx="1095" cy="448" r="15"/>
      <circle cx="1218" cy="351" r="17" fill="#d5e8e5"/>
    </g>
    <rect x="1087" y="526" width="262" height="54" rx="27" fill="#cfe8d3" stroke="#4f8160" stroke-width="3"/>
    <text class="heading" x="1218" y="562" text-anchor="middle">SUPPORTED v1</text>
    <text class="label" x="1218" y="615" text-anchor="middle">Rank by loops braced</text>
  </g>

  <!-- Stage 4: ranked shortlist and plate -->
  <g>
    <rect x="1548" y="240" width="221" height="54" rx="12" fill="#b8ddd6"/>
    <text class="label" x="1658" y="276" text-anchor="middle">V39A D40G</text>
    <rect x="1548" y="315" width="221" height="54" rx="12" fill="#dfe4e7"/>
    <text class="label" x="1658" y="351" text-anchor="middle">V39A D40C</text>
    <rect x="1548" y="390" width="221" height="54" rx="12" fill="#dfe4e7"/>
    <text class="label" x="1658" y="426" text-anchor="middle">D40G V54A</text>
    <circle cx="1658" cy="469" r="4" fill="#526170"/>
    <circle cx="1658" cy="486" r="4" fill="#526170"/>
    <circle cx="1658" cy="503" r="4" fill="#526170"/>
    <path class="thin" d="M1790 227 H1810 Q1826 227 1826 243 V502 Q1826 518 1810 518 H1790"/>
    <path class="line" d="M1838 373 H1872" marker-end="url(#arrow)"/>

    <rect x="1892" y="276" width="126" height="174" rx="14" fill="#f4f5f3" stroke="#34485a" stroke-width="4"/>
    <g fill="#4d8c8b" stroke="#34485a" stroke-width="1.5">
      <circle cx="1912" cy="300" r="7"/><circle cx="1935" cy="300" r="7" fill="#c9cfd3"/><circle cx="1958" cy="300" r="7" fill="#c9cfd3"/><circle cx="1981" cy="300" r="7"/><circle cx="2004" cy="300" r="7" fill="#c9cfd3"/>
      <circle cx="1912" cy="325" r="7"/><circle cx="1935" cy="325" r="7"/><circle cx="1958" cy="325" r="7" fill="#c9cfd3"/><circle cx="1981" cy="325" r="7" fill="#c9cfd3"/><circle cx="2004" cy="325" r="7"/>
      <circle cx="1912" cy="350" r="7" fill="#c9cfd3"/><circle cx="1935" cy="350" r="7"/><circle cx="1958" cy="350" r="7"/><circle cx="1981" cy="350" r="7" fill="#c9cfd3"/><circle cx="2004" cy="350" r="7" fill="#c9cfd3"/>
      <circle cx="1912" cy="375" r="7"/><circle cx="1935" cy="375" r="7" fill="#c9cfd3"/><circle cx="1958" cy="375" r="7"/><circle cx="1981" cy="375" r="7"/><circle cx="2004" cy="375" r="7" fill="#c9cfd3"/>
      <circle cx="1912" cy="400" r="7" fill="#c9cfd3"/><circle cx="1935" cy="400" r="7"/><circle cx="1958" cy="400" r="7" fill="#c9cfd3"/><circle cx="1981" cy="400" r="7"/><circle cx="2004" cy="400" r="7"/>
      <circle cx="1912" cy="425" r="7"/><circle cx="1935" cy="425" r="7" fill="#c9cfd3"/><circle cx="1958" cy="425" r="7"/><circle cx="1981" cy="425" r="7" fill="#c9cfd3"/><circle cx="2004" cy="425" r="7"/>
    </g>
    <text class="label" x="1778" y="563" text-anchor="middle">Experimental shortlist</text>
  </g>

  <!-- Optional ESM-2 controls branch -->
  <path class="optional-line" d="M846 514 V674 H905" marker-end="url(#arrowOptional)"/>
  <rect x="482" y="642" width="1070" height="132" rx="24" fill="#f2f3f3" stroke="#aab4bc" stroke-width="3" stroke-dasharray="10 9"/>
  <rect x="520" y="622" width="353" height="40" rx="20" fill="#fbfaf7"/>
  <text class="tiny" x="696" y="649" text-anchor="middle">OPTIONAL ESM-2 SIGNALS · CONTROLS</text>

  <rect x="532" y="680" width="259" height="61" rx="14" fill="#34485a"/>
  <text class="label white" x="661" y="718" text-anchor="middle">Conjoint ESM-2</text>
  <path class="muted-line" d="M812 711 H862" marker-end="url(#arrowOptional)"/>

  <rect x="882" y="668" width="286" height="42" rx="12" fill="#e7eaec"/>
  <text class="small" x="1025" y="696" text-anchor="middle">Predicted fitness → baseline</text>
  <rect x="882" y="720" width="286" height="42" rx="12" fill="#e7eaec"/>
  <text class="small" x="1025" y="748" text-anchor="middle">Masking dispersion → info</text>

  <rect x="1196" y="668" width="310" height="42" rx="21" fill="#e7eaec" stroke="#aab4bc" stroke-width="2"/>
  <text class="tiny" x="1351" y="695" text-anchor="middle">FITNESS-GREEDY CONTROL</text>
  <rect x="1196" y="720" width="310" height="42" rx="21" fill="#f2ddda" stroke="#bd7a72" stroke-width="2"/>
  <text class="tiny" x="1351" y="747" text-anchor="middle">NO ADDED BENEFIT</text>

  <!-- Bottom statement -->
  <text x="1024" y="854" text-anchor="middle" style="font: 400 43px Arial, Helvetica, sans-serif; fill: #0f1b2d;">
    Select measurements that expose interaction structure—not merely predicted fitness.
  </text>
</svg>
